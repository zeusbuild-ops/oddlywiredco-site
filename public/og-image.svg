<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Ink background -->
  <rect width="1200" height="630" fill="#0E0E11"/>

  <!-- Subtle Pulse corner accent -->
  <rect x="0" y="0" width="6" height="630" fill="#4CE2C1"/>

  <!-- Eyebrow -->
  <text x="60" y="80" font-family="Menlo, 'Courier New', monospace" font-size="18" font-weight="400"
        fill="#F4EFE6" opacity="0.55" letter-spacing="3">
    &gt; ODDLYWIREDCO · EST. 2026
  </text>

  <!-- Wordmark: odd (bold) ly (reg) wired (bold) co (small italic) -->
  <g transform="translate(60 280)">
    <text font-family="'Courier New', Menlo, monospace" font-size="128" letter-spacing="-4">
      <tspan font-weight="700" fill="#F4EFE6">odd</tspan><tspan font-weight="400" fill="#F4EFE6">ly</tspan><tspan font-weight="700" fill="#F4EFE6">wired</tspan><tspan font-style="italic" font-weight="400" font-size="64" fill="#F4EFE6" opacity="0.55" dx="6" dy="-32">co</tspan>
    </text>
  </g>

  <!-- Sine squiggle -->
  <path d="M 60 360 Q 130 320 200 360 T 340 360 T 480 360 T 620 360 T 760 360 T 900 360"
        stroke="#4CE2C1" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Tagline line 1 -->
  <text x="60" y="450" font-family="Menlo, 'Courier New', monospace" font-size="44" font-weight="700"
        fill="#F4EFE6" letter-spacing="-1">
    your brain isn't broken.
  </text>
  <!-- Tagline line 2 -->
  <text x="60" y="510" font-family="Menlo, 'Courier New', monospace" font-size="44" font-weight="700"
        fill="#4CE2C1" letter-spacing="-1">
    it's just oddly wired.
  </text>

  <!-- Bottom strip: small mono caption -->
  <text x="60" y="580" font-family="Menlo, 'Courier New', monospace" font-size="16" font-weight="400"
        fill="#F4EFE6" opacity="0.55" letter-spacing="2">
    AN ADHD BRAND · MADE FOR THE MOMENTS NOBODY ELSE NAMES
  </text>
</svg>
